databases:
  - name: proofstamp-db
    plan: free

services:
  # Python Stego Service (Native Python, NO DOCKER)
  - type: web
    name: proofstamp-stego
    env: python
    plan: free
    rootDir: stego-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

  # Node.js Backend API
  - type: web
    name: proofstamp-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run prisma:generate && npx prisma migrate deploy --schema=../prisma/schema.prisma
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: proofstamp-db
          property: connectionString
      - key: STEGO_SERVICE_URL
        value: ${proofstamp-stego.onrender.com}
      - key: CLIENT_URL
        sync: false
